name: build-beta

# Two ways to run:
#  * push a tag matching build-*   -> auto-builds with defaults (tester=beta, 14d)
#  * Actions -> build-beta -> Run  -> per-tester build (set tester + days)
on:
  workflow_dispatch:
    inputs:
      tester:
        description: "Tester id (watermark, baked into the binary)"
        required: true
        default: "beta"
      days:
        description: "Days until the build expires"
        required: true
        default: "14"
  push:
    tags:
      - "build-*"

concurrency:
  group: build-beta-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # -------------------------------------------------- macOS (Apple Silicon) --
  macos-arm64:
    runs-on: macos-14          # M-series runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app + .dmg
        run: ./build/build_macos.sh --tester "${{ github.event.inputs.tester || 'beta' }}" --days "${{ github.event.inputs.days || '14' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: CBMI-Loop-macOS-arm64-${{ github.event.inputs.tester || 'beta' }}
          path: dist/*.dmg
          if-no-files-found: error

  # -------------------------------------------------------- macOS (Intel) ----
  macos-x64:
    runs-on: macos-13          # Intel runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app + .dmg
        run: ./build/build_macos.sh --tester "${{ github.event.inputs.tester || 'beta' }}" --days "${{ github.event.inputs.days || '14' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: CBMI-Loop-macOS-x64-${{ github.event.inputs.tester || 'beta' }}
          path: dist/*.dmg
          if-no-files-found: error

  # ------------------------------------------------------------- Windows -----
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Icon + ensure-encrypted + stamp
        run: |
          python build/make_icon.py
          python vendor.py --encrypt-only
          python build/inject_build_info.py --tester "${{ github.event.inputs.tester || 'beta' }}" --days "${{ github.event.inputs.days || '14' }}"
      - name: Freeze (onedir)
        run: python -m PyInstaller --noconfirm --clean cbmi_loop.spec
      - name: Reset build stamp
        run: python build/inject_build_info.py --reset
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DTesterId=${{ github.event.inputs.tester || 'beta' }} /DAppVersion=0.1.0-beta `
            installer\windows.iss
      - uses: actions/upload-artifact@v4
        with:
          name: CBMI-Loop-Windows-x64-${{ github.event.inputs.tester || 'beta' }}
          path: dist/*Setup.exe
          if-no-files-found: error
