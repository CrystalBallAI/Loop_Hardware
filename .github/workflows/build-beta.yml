name: build-beta

# Per-tester beta builds for all three targets. Trigger manually
# (Actions -> build-beta -> Run workflow) with the tester id + expiry days.
on:
  workflow_dispatch:
    inputs:
      tester:
        description: "Tester id (watermark, baked into the binary)"
        required: true
        default: "beta"
      days:
        description: "Days until the build expires"
        required: true
        default: "14"

permissions:
  contents: read

jobs:
  # -------------------------------------------------- macOS (Apple Silicon) --
  macos-arm64:
    runs-on: macos-14          # M-series runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app + .dmg
        run: ./build/build_macos.sh --tester "${{ inputs.tester }}" --days "${{ inputs.days }}"
      - uses: actions/upload-artifact@v4
        with:
          name: CBMI-Loop-macOS-arm64-${{ inputs.tester }}
          path: dist/*.dmg

  # -------------------------------------------------------- macOS (Intel) ----
  macos-x64:
    runs-on: macos-13          # Intel runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build .app + .dmg
        run: ./build/build_macos.sh --tester "${{ inputs.tester }}" --days "${{ inputs.days }}"
      - uses: actions/upload-artifact@v4
        with:
          name: CBMI-Loop-macOS-x64-${{ inputs.tester }}
          path: dist/*.dmg

  # ------------------------------------------------------------- Windows -----
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Icon + vendor(encrypt) + stamp
        run: |
          python build/make_icon.py
          python vendor.py --encrypt-only
          python build/inject_build_info.py --tester "${{ inputs.tester }}" --days "${{ inputs.days }}"
      - name: Freeze (onedir)
        run: python -m PyInstaller --noconfirm --clean cbmi_loop.spec
      - name: Reset build stamp
        run: python build/inject_build_info.py --reset
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Build installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DTesterId=${{ inputs.tester }} /DAppVersion=0.1.0-beta `
            installer\windows.iss
      - uses: actions/upload-artifact@v4
        with:
          name: CBMI-Loop-Windows-x64-${{ inputs.tester }}
          path: dist/*Setup.exe
